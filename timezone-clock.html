<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .timezone-name {
            color: #e0e0e0;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .time-display {
            color: #00ff88;
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .date-display {
            color: #b0b0b0;
            font-size: 0.85em;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .timezone-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        select {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            min-width: 150px;
        }

        select option {
            background: #333;
            color: white;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .time-display {
                font-size: 1.8em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Multi-Timezone Clock</h1>
        
        <div class="controls">
            <button onclick="addClock()">+ Add Timezone</button>
            <button onclick="resetClocks()">Reset to Default</button>
        </div>

        <div class="timezone-selector">
            <select id="timezoneSelect">
                <option value="">Select timezone to add</option>
                <option value="UTC">UTC (Coordinated Universal Time)</option>
                <option value="America/New_York">New York (EST/EDT)</option>
                <option value="America/Los_Angeles">Los Angeles (PST/PDT)</option>
                <option value="America/Chicago">Chicago (CST/CDT)</option>
                <option value="America/Denver">Denver (MST/MDT)</option>
                <option value="Europe/London">London (GMT/BST)</option>
                <option value="Europe/Paris">Paris (CET/CEST)</option>
                <option value="Europe/Berlin">Berlin (CET/CEST)</option>
                <option value="Asia/Tokyo">Tokyo (JST)</option>
                <option value="Asia/Hong_Kong">Hong Kong (HKT)</option>
                <option value="Asia/Shanghai">Shanghai (CST)</option>
                <option value="Asia/Singapore">Singapore (SGT)</option>
                <option value="Asia/Bangkok">Bangkok (ICT)</option>
                <option value="Asia/Dubai">Dubai (GST)</option>
                <option value="Asia/Kolkata">India (IST)</option>
                <option value="Australia/Sydney">Sydney (AEDT/AEST)</option>
                <option value="Australia/Melbourne">Melbourne (AEDT/AEST)</option>
                <option value="Pacific/Auckland">Auckland (NZDT/NZST)</option>
                <option value="Africa/Johannesburg">Johannesburg (SAST)</option>
                <option value="Africa/Cairo">Cairo (EET)</option>
                <option value="America/Sao_Paulo">São Paulo (BRT)</option>
                <option value="America/Argentina/Buenos_Aires">Buenos Aires (ART)</option>
                <option value="Asia/Istanbul">Istanbul (EET/EEST)</option>
                <option value="Asia/Moscow">Moscow (MSK)</option>
                <option value="Asia/Seoul">Seoul (KST)</option>
                <option value="Pacific/Fiji">Fiji (FJT)</option>
            </select>
        </div>

        <div class="clocks-grid" id="clocksContainer"></div>

        <div class="footer">
            <p>Times update every second. Click 'Add Timezone' to customize your view.</p>
        </div>
    </div>

    <script>
        // Default timezones
        const defaultTimezones = [
            'UTC',
            'America/New_York',
            'Europe/London',
            'Asia/Tokyo',
            'Australia/Sydney',
            'Africa/Johannesburg'
        ];

        let currentTimezones = [...defaultTimezones];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateAllClocks();
            setInterval(updateAllClocks, 1000);
        });

        function updateAllClocks() {
            const container = document.getElementById('clocksContainer');
            container.innerHTML = '';

            currentTimezones.forEach((tz, index) => {
                const clockCard = document.createElement('div');
                clockCard.className = 'clock-card';
                
                const now = new Date();
                const time = new Date(now.toLocaleString('en-US', { timeZone: tz }));
                
                const timeString = time.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit',
                    hour12: true
                });
                
                const dateString = time.toLocaleDateString('en-US', {
                    weekday: 'short',
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });

                const displayName = tz.replace(/_/g, ' ');

                clockCard.innerHTML = `
                    <div class="timezone-name">${displayName}</div>
                    <div class="time-display">${timeString}</div>
                    <div class="date-display">${dateString}</div>
                    <button onclick="removeTimezone(${index})" style="margin-top: 15px; width: 100%; font-size: 0.8em;">Remove</button>
                `;
                
                container.appendChild(clockCard);
            });
        }

        function addClock() {
            const select = document.getElementById('timezoneSelect');
            const tz = select.value;
            
            if (tz && !currentTimezones.includes(tz)) {
                currentTimezones.push(tz);
                select.value = '';
                updateAllClocks();
            } else if (tz) {
                alert('This timezone is already added!');
            } else {
                alert('Please select a timezone');
            }
        }

        function removeTimezone(index) {
            if (currentTimezones.length > 1) {
                currentTimezones.splice(index, 1);
                updateAllClocks();
            } else {
                alert('You must keep at least one timezone!');
            }
        }

        function resetClocks() {
            currentTimezones = [...defaultTimezones];
            document.getElementById('timezoneSelect').value = '';
            updateAllClocks();
        }

        // Allow Enter key to add timezone
        document.getElementById('timezoneSelect').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addClock();
            }
        });
    </script>
</body>
</html>
